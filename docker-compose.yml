version: '3.7'

services:
  ollama:
    build: ./config/ollama/
    environment:
      #https://ollama.ai/library
      #MODEL: "mistral"
      #MODEL: "llama2-uncensored"
      #MODEL: "codellama"
      MODEL: "gemma4:e4b"
    volumes:
      - ./data:/root/.ollama
  aider:
    build: ./config/aider/
    environment:
      OLLAMA_API_BASE: "http://ollama:11434"
      AIDER_MODEL: "ollama/gemma4:e4b"
