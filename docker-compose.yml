version: '3.7'

services:
  ollama:
    image: cecemel/app-ollama-experiment-ollama:0.0.1
    build: ./config/ollama/
    environment:
      # see: https://ollama.ai/library
      # Possible models:
      #MODEL: "mistral"
      #MODEL: "llama2-uncensored"
      #MODEL: "codellama"
      MODEL: "gemma4:e4b"
    volumes:
      - ./data:/root/.ollama
  agent:
    image: cecemel/app-ollama-experiment-agent:0.0.1
    build: ./config/agent/
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      MODEL: "gemma4:e4b"
    volumes:
      - ./config/agent/agent.py:/app/agent.py

  aider:
    image: cecemel/app-ollama-experiment-aider:0.0.1
    build: ./config/aider/
    environment:
      OLLAMA_API_BASE: "http://ollama:11434"
      AIDER_MODEL: "ollama/gemma4:e4b"
